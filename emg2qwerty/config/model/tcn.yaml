# @package _global_
module:
  _target_: emg2qwerty.lightning.TCNCTCModule
  in_features: 528
  mlp_features: [512]
  num_channels: [256, 256, 256, 256, 256, 256, 256, 256, 256, 256]
  kernel_size: 15
  dropout: 0.2
  lr: 0.004            # Increased from default (usually 0.001 or lower)
  weight_decay: 1e-3   # Helps prevent overfitting with more params

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000 # 4 sec windows for 2kHz EMG
  padding: [1800, 200] # 900ms past context, 100ms future context